name: Release application on all platforms

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
            # 32-bit (build:win32) is intentionally skipped;
            # Windows 10/11 dropped 32-bit support in 2020. 
          - os: windows-latest
            script: build:win64
          - os: ubuntu-latest
            script: build:linux
          - os: macos-latest
            script: build:mac

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Read version
        id: pkg
        run: echo "version=$(node -p \"require('./package.json').version\")" >> $GITHUB_OUTPUT

      - name: Build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run ${{ matrix.script }}

      - name: Upload Release (electron-builder assets only)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --publish never

      - name: Create GitHub Release with notes
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: DartsMate v${{ steps.pkg.outputs.version }}
          generate_release_notes: true
