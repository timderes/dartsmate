name: Build application on all platforms

# Remove the write permissions, see CodeQL `actions/missing-workflow-permissions`
permissions:
  actions: write # Needed for caching npm dependencies
  contents: read

# We only need to check if the build works on push to main,
# as we have linting and formatting checks on pull requests.
on:
  push:
    branches: [main]
  # pull_request:
  # branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
      - name: Cache electron + npm
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ${{ env.LOCALAPPDATA }}\electron
            ${{ env.LOCALAPPDATA }}\electron-builder
            ~/.npm
            node_modules
          key: ${{ runner.os }}-build-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-
      - run: npm ci
      - run: npm run build:linux
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ runner.os }}
          path: |
            dist/**
            release/**
            build/**
            out/**

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
      - name: Cache electron + npm
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ${{ env.LOCALAPPDATA }}\electron
            ${{ env.LOCALAPPDATA }}\electron-builder
            ~/.npm
            node_modules
          key: ${{ runner.os }}-build-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-
      - run: npm ci
      - run: npm run build:win64

      # 32 bit is dropped by Windows 10/11 in 2020, so we can
      # skip it. Maybe we should remove the build script in
      # the future as well?

      # npm run build:win32

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ runner.os }}
          path: |
            dist/**
            release/**
            build/**
            out/**

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
      - name: Cache electron + npm
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ${{ env.LOCALAPPDATA }}\electron
            ${{ env.LOCALAPPDATA }}\electron-builder
            ~/.npm
            node_modules
          key: ${{ runner.os }}-build-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-
      - name: Cache electron + npm (macOS)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/.npm
          key: ${{ runner.os }}-electron-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-
      - name: Cache electron + npm (Linux)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/.npm
          key: ${{ runner.os }}-electron-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-
