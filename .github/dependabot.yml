version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    # Group updates into a single development branch,
    # so we can test them together before merging into main
    target-branch: "deps-updates"
    open-pull-requests-limit: 10
    groups:
      # Group Mantine UI updates together to ensure consistency
      mantine:
        patterns:
          - "@mantine/*"
          - "postcss-preset-mantine"
      # Group React and Next.js updates (often related)
      framework:
        patterns:
          - "react"
          - "react-dom"
          - "next"
          - "next-i18next"
          - "nextron"
      # Group Electron related packages
      electron:
        patterns:
          - "electron"
          - "electron-*"
